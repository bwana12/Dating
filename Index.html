<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AURA — Find Your Frequency</title>

<!-- Firebase SDKs (Compat version for easier handling in single HTML) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg:        #090b12;
  --bg2:       #0f1220;
  --bg3:       #151929;
  --glass:     rgba(255,255,255,0.04);
  --glass2:    rgba(255,255,255,0.08);
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --p1:        #7c5cfc;
  --p2:        #4f8ef7;
  --p3:        #c05cf7;
  --accent:    #fc5c9c;
  --green:     #23e5a0;
  --text:      #f0f2ff;
  --text2:     #8b93b8;
  --text3:     #545d7f;
  --r-sm:      12px;
  --r-md:      18px;
  --r-lg:      26px;
  --r-xl:      36px;
  --shadow:    0 8px 32px rgba(0,0,0,0.5);
  --glow-p:    0 0 30px rgba(124,92,252,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

#app {
  width: 100%;
  max-width: 430px;
  height: 100dvh;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ===== PAGES ===== */
.page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity .35s ease, transform .35s ease;
  transform: translateX(30px);
  background: var(--bg);
}
.page.active {
  opacity: 1;
  pointer-events: all;
  transform: translateX(0);
}
.page.slide-out {
  opacity: 0;
  transform: translateX(-30px);
}

.mesh-bg {
  position: absolute;
  inset: -50%;
  background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,92,252,0.15) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 80% 90%, rgba(79,142,247,0.12) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* TYPOGRAPHY */
.grad-text { background: linear-gradient(135deg, var(--p1), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
h1, h2, h3 { font-family: 'Syne', sans-serif; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 28px; border: none; border-radius: var(--r-md);
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all .25s ease;
}
.btn-primary { background: linear-gradient(135deg, var(--p1), var(--p2)); color: white; box-shadow: var(--glow-p); }
.btn-ghost { background: var(--glass2); color: var(--text); border: 1px solid var(--border2); }
.btn-full { width: 100%; }

/* INPUTS */
.input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
.input {
  width: 100%; background: var(--glass2); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 14px; color: var(--text); outline: none;
}

/* SWIPE STACK */
.swipe-stack { position: relative; width: 100%; max-width: 360px; height: 480px; margin: auto; }
.swipe-card {
  position: absolute; inset: 0; border-radius: var(--r-xl);
  overflow: hidden; background: var(--bg2); box-shadow: var(--shadow);
  transform-origin: bottom center; touch-action: none;
}
.swipe-card-image { width: 100%; height: 100%; object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 100px; }
.swipe-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

/* BOTTOM NAV */
#bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0; height: 72px;
  background: rgba(9,11,18,0.9); border-top: 1px solid var(--border);
  display: none; align-items: center; justify-content: space-around; z-index: 100;
}
#bottom-nav.visible { display: flex; }
.nav-item { color: var(--text3); display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.nav-item.active { color: var(--p1); }

/* LOADING */
#loading-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }

#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
  background: var(--bg3); padding: 12px 24px; border-radius: 100px; z-index: 9999; transition: 0.4s;
}
#toast.show { transform: translateX(-50%) translateY(0); }

#match-popup {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
    display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;
}
</style>
</head>
<body>

<div id="app">
  <div class="mesh-bg"></div>

  <div id="loading-overlay">
    <h1 class="grad-text" style="font-size: 44px;">AURA</h1>
    <div style="margin-top:20px; width:40px; height:40px; border:3px solid var(--border2); border-top-color:var(--p1); border-radius:50%; animation:spin 1s linear infinite;"></div>
  </div>

  <div id="toast"></div>

  <!-- MATCH POPUP -->
  <div id="match-popup">
    <h1 class="grad-text" style="font-size: 40px;">It's a Match!</h1>
    <p id="match-text" style="margin: 20px;">You and Sofia liked each other!</p>
    <button class="btn btn-primary" onclick="document.getElementById('match-popup').style.display='none'">Keep Swiping</button>
  </div>

  <!-- LANDING -->
  <div id="page-landing" class="page">
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center;">
      <h1 class="grad-text" style="font-size: 50px; font-weight:800;">AURA</h1>
      <p style="color:var(--text2); letter-spacing: 2px; margin-bottom: 50px;">FIND YOUR FREQUENCY</p>
      <button class="btn btn-primary btn-full" onclick="showPage('register')">Get Started</button>
      <button class="btn btn-ghost btn-full" style="margin-top:15px;" onclick="showPage('login')">Sign In</button>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="page-login" class="page">
    <div style="padding:30px;">
      <button onclick="showPage('landing')" style="background:none; border:none; color:white; font-size:24px; margin-bottom:20px;">←</button>
      <h2>Sign In</h2>
      <div class="input-group" style="margin-top:20px;">
        <input type="email" id="login-email" class="input" placeholder="Email">
        <input type="password" id="login-password" class="input" placeholder="Password">
      </div>
      <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign In</button>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="page-register" class="page">
    <div style="padding:30px; overflow-y:auto;">
      <button onclick="showPage('landing')" style="background:none; border:none; color:white; font-size:24px; margin-bottom:20px;">←</button>
      <h2>Create Profile</h2>
      <div class="input-group" style="margin-top:20px;">
        <input type="text" id="reg-name" class="input" placeholder="Name">
        <input type="number" id="reg-age" class="input" placeholder="Age">
        <input type="email" id="reg-email" class="input" placeholder="Email">
        <input type="password" id="reg-password" class="input" placeholder="Password (min 6 chars)">
        <textarea id="reg-bio" class="input" placeholder="Bio..." rows="3"></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="handleRegister()">Create Account</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="page-dashboard" class="page">
    <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
      <h3 class="grad-text">AURA</h3>
      <span style="font-size:20px;">🔥</span>
    </div>
    <div id="swipe-stack" class="swipe-stack"></div>
    <div style="display:flex; justify-content:center; gap:20px; margin-top:30px;">
        <button class="btn btn-ghost" style="border-radius:50%; width:60px; height:60px;" onclick="swipe('left')">✕</button>
        <button class="btn btn-primary" style="border-radius:50%; width:70px; height:70px;" onclick="swipe('right')">💜</button>
    </div>
  </div>

  <!-- MATCHES -->
  <div id="page-matches" class="page">
    <div style="padding:20px;">
        <h2>Matches</h2>
        <div id="matches-list" style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="page-profile" class="page">
    <div style="padding:40px; text-align:center;">
        <div id="profile-pic" style="font-size:80px; margin-bottom:20px;">😊</div>
        <h2 id="profile-name-age">User, 25</h2>
        <p id="profile-bio-text" style="color:var(--text2); margin-top:10px;"></p>
        <button class="btn btn-ghost btn-full" style="margin-top:40px;" onclick="handleSignOut()">Sign Out</button>
    </div>
  </div>

  <!-- NAV -->
  <nav id="bottom-nav">
    <div class="nav-item active" onclick="switchNav('dashboard')"><span>🔥</span><small>Discover</small></div>
    <div class="nav-item" onclick="switchNav('matches')"><span>💜</span><small>Matches</small></div>
    <div class="nav-item" onclick="switchNav('profile')"><span>👤</span><small>Profile</small></div>
  </nav>

</div>

<script>
// ============================================================
// FIREBASE SETUP
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDsc7eq6y-FmSp5QyNg9PTlg5ZVbUlU_Ok",
  authDomain: "dating-f5c7f.firebaseapp.com",
  projectId: "dating-f5c7f",
  storageBucket: "dating-f5c7f.firebasestorage.app",
  messagingSenderId: "1068091857220",
  appId: "1:1068091857220:web:ff9a4fb6625f978bac1f11",
  measurementId: "G-JQ43QG36CW"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============================================================
// APP STATE
// ============================================================
let currentUserData = null;
let currentIdx = 0;
const DUMMY_USERS = [
  { id: 'd1', name: 'Sofia', age: 23, emoji: '🌺', bio: 'Living life one coffee at a time.' },
  { id: 'd2', name: 'Jake', age: 27, emoji: '🎸', bio: 'Musician looking for a muse.' },
  { id: 'd3', name: 'Maya', age: 25, emoji: '🌙', bio: 'Astrology and hiking.' },
  { id: 'd4', name: 'Liam', age: 29, emoji: '🏄', bio: 'Catch waves, not feelings.' }
];

// ============================================================
// NAVIGATION
// ============================================================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');

  const nav = document.getElementById('bottom-nav');
  if (['dashboard', 'matches', 'profile'].includes(name)) {
    nav.classList.add('visible');
    document.querySelectorAll('.nav-item').forEach((item, i) => {
        const pages = ['dashboard', 'matches', 'profile'];
        item.classList.toggle('active', pages[i] === name);
    });
  } else {
    nav.classList.remove('visible');
  }
}

function switchNav(name) {
    showPage(name);
    if(name === 'dashboard') renderCards();
    if(name === 'matches') renderMatches();
}

// ============================================================
// AUTH ACTIONS
// ============================================================
async function handleRegister() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const name = document.getElementById('reg-name').value;
  const age = document.getElementById('reg-age').value;
  const bio = document.getElementById('reg-bio').value;

  if(!email || password.length < 6 || !name) return showToast("Check your inputs!");

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await db.collection('users').doc(cred.user.uid).set({
      name, age, bio, email, likes: [], matches: [], emoji: '😊'
    });
    showToast("Profile created!");
  } catch (e) {
    showToast(e.message);
  }
}

async function handleLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (e) {
    showToast("Login failed: " + e.message);
  }
}

function handleSignOut() {
  auth.signOut().then(() => location.reload());
}

// ============================================================
// CORE LOGIC
// ============================================================
auth.onAuthStateChanged(async (user) => {
  const loader = document.getElementById('loading-overlay');
  if (user) {
    const doc = await db.collection('users').doc(user.uid).get();
    currentUserData = doc.data();
    loader.classList.add('hidden');
    switchNav('dashboard');
    updateProfileUI();
  } else {
    loader.classList.add('hidden');
    showPage('landing');
  }
});

function renderCards() {
    const stack = document.getElementById('swipe-stack');
    stack.innerHTML = '';
    const slice = DUMMY_USERS.slice(currentIdx, currentIdx + 2);
    
    if(slice.length === 0) {
        stack.innerHTML = '<div style="text-align:center; padding-top:100px;"><h2>No one new!</h2><button class="btn btn-ghost" onclick="currentIdx=0;renderCards()">Refresh</button></div>';
        return;
    }

    slice.reverse().forEach((user, i) => {
        const card = document.createElement('div');
        card.className = 'swipe-card';
        card.style.zIndex = i;
        card.innerHTML = `
            <div class="swipe-card-image">${user.emoji}</div>
            <div class="swipe-card-info">
                <h2>${user.name}, ${user.age}</h2>
                <p style="color:rgba(255,255,255,0.7)">${user.bio}</p>
            </div>
        `;
        stack.appendChild(card);
    });
}

async function swipe(dir) {
    const cards = document.querySelectorAll('.swipe-card');
    if(cards.length === 0) return;
    const topCard = cards[cards.length - 1];
    
    topCard.style.transition = '0.5s';
    topCard.style.transform = `translateX(${dir === 'left' ? -200 : 200}%) rotate(${dir === 'left' ? -20 : 20}deg)`;
    topCard.style.opacity = '0';

    if(dir === 'right') {
        const likedUser = DUMMY_USERS[currentIdx];
        // Persistent Like in Firestore
        await db.collection('users').doc(auth.currentUser.uid).update({
            likes: firebase.firestore.FieldValue.arrayUnion(likedUser.id)
        });

        // Mock a Match
        if(Math.random() > 0.5) {
            await db.collection('users').doc(auth.currentUser.uid).update({
                matches: firebase.firestore.FieldValue.arrayUnion(likedUser)
            });
            showMatch(likedUser.name);
        }
    }

    currentIdx++;
    setTimeout(() => renderCards(), 500);
}

function showMatch(name) {
    document.getElementById('match-text').innerText = `You and ${name} liked each other!`;
    document.getElementById('match-popup').style.display = 'flex';
}

async function renderMatches() {
    const list = document.getElementById('matches-list');
    list.innerHTML = 'Loading...';
    
    const doc = await db.collection('users').doc(auth.currentUser.uid).get();
    const data = doc.data();
    list.innerHTML = '';
    
    if(!data.matches || data.matches.length === 0) {
        list.innerHTML = '<p style="grid-column:1/3; text-align:center;">No matches yet.</p>';
        return;
    }

    data.matches.forEach(m => {
        const div = document.createElement('div');
        div.style.background = 'var(--glass2)';
        div.style.padding = '15px';
        div.style.borderRadius = '15px';
        div.style.textAlign = 'center';
        div.innerHTML = `<div style="font-size:30px;">${m.emoji}</div><b>${m.name}</b>`;
        list.appendChild(div);
    });
}

function updateProfileUI() {
    document.getElementById('profile-name-age').innerText = `${currentUserData.name}, ${currentUserData.age}`;
    document.getElementById('profile-bio-text').innerText = currentUserData.bio;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

@keyframes spin { to { transform: rotate(360deg); } }
</script>
</body>
</html>
