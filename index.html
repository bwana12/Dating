<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AURA — Find Your Frequency</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg: #090b12; --bg2: #0f1220; --bg3: #151929;
  --glass: rgba(255,255,255,0.04); --glass2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --p1: #7c5cfc; --p2: #4f8ef7; --p3: #c05cf7;
  --accent: #fc5c9c; --green: #23e5a0;
  --text: #f0f2ff; --text2: #8b93b8; --text3: #545d7f;
  --r-lg: 26px; --shadow: 0 8px 32px rgba(0,0,0,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

#app { width: 100%; max-width: 430px; height: 100dvh; margin: 0 auto; position: relative; overflow: hidden; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

/* PAGE TRANSITIONS */
.page { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.4s ease; transform: translateX(30px); background: var(--bg); }
.page.active { opacity: 1; pointer-events: all; transform: translateX(0); }

.mesh-bg { position: absolute; inset: -50%; background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,92,252,0.1) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 80% 90%, rgba(79,142,247,0.1) 0%, transparent 60%); z-index: 0; pointer-events: none; }

/* UI COMPONENTS */
.grad-text { background: linear-gradient(135deg, var(--p1), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border: none; border-radius: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; }
.btn-primary { background: linear-gradient(135deg, var(--p1), var(--p2)); color: white; box-shadow: 0 0 20px rgba(124,92,252,0.3); }
.btn-ghost { background: var(--glass2); color: var(--text); border: 1px solid var(--border2); }
.btn-full { width: 100%; }

.input { width: 100%; background: var(--glass2); border: 1px solid var(--border2); border-radius: 12px; padding: 14px; color: white; outline: none; margin-bottom: 12px; }

/* SWIPE SYSTEM */
.swipe-stack { position: relative; flex: 1; width: 100%; max-width: 360px; height: 480px; margin: 20px auto; }
.swipe-card { position: absolute; inset: 0; border-radius: var(--r-lg); overflow: hidden; background: var(--bg2); border: 1px solid var(--border); box-shadow: var(--shadow); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; touch-action: none; }
.swipe-card-img { width: 100%; height: 70%; background: #1a1f35; display: flex; align-items: center; justify-content: center; font-size: 80px; object-fit: cover; }
.swipe-card-info { padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); position: absolute; bottom: 0; width: 100%; }

/* CHAT SYSTEM */
#chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; }
.msg.sent { align-self: flex-end; background: var(--p1); border-bottom-right-radius: 4px; }
.msg.received { align-self: flex-start; background: var(--glass2); border-bottom-left-radius: 4px; }

/* LOADING SCREEN */
#loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
#loading-overlay.hidden { opacity: 0; pointer-events: none; }

/* NAV */
#bottom-nav { position: absolute; bottom: 0; width: 100%; height: 72px; background: rgba(9,11,18,0.95); display: none; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); backdrop-filter: blur(10px); z-index: 100; }
#bottom-nav.visible { display: flex; }
.nav-item { color: var(--text3); cursor: pointer; text-align: center; }
.nav-item.active { color: var(--p1); }

/* MATCH POPUP */
#match-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
</style>
</head>
<body>

<div id="app">
  <div class="mesh-bg"></div>

  <!-- LOADING -->
  <div id="loading-overlay">
    <h1 class="grad-text" style="font-size: 44px; font-family: 'Syne';">AURA</h1>
    <div style="width: 30px; height: 30px; border: 3px solid var(--p1); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px;"></div>
  </div>

  <!-- MATCH POPUP -->
  <div id="match-popup">
    <h1 class="grad-text" style="font-size: 48px; font-family: 'Syne';">It's a Match!</h1>
    <p style="margin: 20px 0; color: var(--text2);">You and <span id="match-name-popup" style="color: white; font-weight: bold;"></span> liked each other!</p>
    <div style="display: flex; gap: 20px; font-size: 50px; margin-bottom: 30px;">
        <span>😊</span><span>💜</span><span id="match-emoji-popup">🔥</span>
    </div>
    <button class="btn btn-primary btn-full" onclick="closeMatchPopup()">Keep Swiping</button>
  </div>

  <!-- PAGE: LANDING -->
  <div id="page-landing" class="page">
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;">
        <h1 class="grad-text" style="font-size: 60px; font-weight: 800; font-family: 'Syne';">AURA</h1>
        <p style="letter-spacing: 4px; color: var(--text2); margin-bottom: 50px;">FIND YOUR FREQUENCY</p>
        <button class="btn btn-primary btn-full" onclick="showPage('register')">Get Started</button>
        <button class="btn btn-ghost btn-full" style="margin-top: 15px;" onclick="showPage('login')">Sign In</button>
    </div>
  </div>

  <!-- PAGE: REGISTER -->
  <div id="page-register" class="page">
    <div style="padding: 30px; overflow-y: auto;">
        <button onclick="showPage('landing')" style="background: none; border: none; color: white; font-size: 24px; margin-bottom: 20px;">←</button>
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Create Profile</h2>
        <input type="text" id="reg-name" class="input" placeholder="Display Name">
        <input type="number" id="reg-age" class="input" placeholder="Age">
        <input type="email" id="reg-email" class="input" placeholder="Email">
        <input type="password" id="reg-pass" class="input" placeholder="Password (min 6 chars)">
        <textarea id="reg-bio" class="input" placeholder="About you..." rows="3"></textarea>
        <button class="btn btn-primary btn-full" onclick="handleRegister()">Start Swiping</button>
    </div>
  </div>

  <!-- PAGE: LOGIN -->
  <div id="page-login" class="page">
    <div style="padding: 30px;">
        <button onclick="showPage('landing')" style="background: none; border: none; color: white; font-size: 24px; margin-bottom: 20px;">←</button>
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Welcome Back</h2>
        <input type="email" id="login-email" class="input" placeholder="Email">
        <input type="password" id="login-pass" class="input" placeholder="Password">
        <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign In</button>
    </div>
  </div>

  <!-- PAGE: DASHBOARD -->
  <div id="page-dashboard" class="page">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <h3 class="grad-text" style="font-family: 'Syne'; font-weight: 800;">AURA</h3>
        <span>🔥</span>
    </div>
    <div id="swipe-stack" class="swipe-stack"></div>
    <div style="display: flex; justify-content: center; gap: 20px; padding: 30px; margin-bottom: 70px;">
        <button class="btn btn-ghost" style="border-radius: 50%; width: 60px; height: 60px;" onclick="rewind()">↩</button>
        <button class="btn btn-ghost" style="border-radius: 50%; width: 60px; height: 60px;" onclick="swipe('left')">✕</button>
        <button class="btn btn-primary" style="border-radius: 50%; width: 75px; height: 75px; font-size: 24px;" onclick="swipe('right')">💜</button>
    </div>
  </div>

  <!-- PAGE: MATCHES -->
  <div id="page-matches" class="page">
    <div style="padding: 20px; overflow-y: auto;">
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Your Matches</h2>
        <div id="matches-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>
  </div>

  <!-- PAGE: CHAT -->
  <div id="page-chat" class="page">
    <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;">
        <button onclick="showPage('matches')" style="background:none; border:none; color:white; font-size:20px;">←</button>
        <div id="chat-header-name" style="font-weight: bold;">Name</div>
    </div>
    <div id="chat-messages"></div>
    <div style="padding: 15px; display: flex; gap: 10px; background: var(--bg2);">
        <input type="text" id="chat-input" class="input" style="margin:0;" placeholder="Say something...">
        <button class="btn btn-primary" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- PAGE: PROFILE -->
  <div id="page-profile" class="page">
    <div style="padding: 40px; text-align: center; overflow-y: auto;">
        <div id="profile-emoji" style="font-size: 80px; margin-bottom: 15px;">😊</div>
        <h2 id="profile-name-display" style="font-family: 'Syne'; font-size: 28px;">User</h2>
        <p id="profile-bio-display" style="color: var(--text2); margin: 15px 0;"></p>
        <button class="btn btn-ghost btn-full" onclick="auth.signOut()">Logout</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <div class="nav-item" onclick="switchNav('dashboard')">🔥<div style="font-size:10px;">Discover</div></div>
    <div class="nav-item" onclick="switchNav('matches')">💜<div style="font-size:10px;">Matches</div></div>
    <div class="nav-item" onclick="switchNav('profile')">👤<div style="font-size:10px;">Profile</div></div>
  </nav>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyDsc7eq6y-FmSp5QyNg9PTlg5ZVbUlU_Ok",
  authDomain: "dating-f5c7f.firebaseapp.com",
  projectId: "dating-f5c7f",
  storageBucket: "dating-f5c7f.firebasestorage.app",
  messagingSenderId: "1068091857220",
  appId: "1:1068091857220:web:ff9a4fb6625f978bac1f11"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- STATE ---
let userData = null;
let currentIdx = 0;
let swipeHistory = [];
let activeChatId = null;
let unsubscribeChat = null;

const DUMMY_USERS = [
  { id: 'bot1', name: 'Sofia', age: 23, emoji: '🌺', bio: 'Living life one coffee at a time.' },
  { id: 'bot2', name: 'Jake', age: 27, emoji: '🎸', bio: 'Musician looking for a muse.' },
  { id: 'bot3', name: 'Maya', age: 25, emoji: '🌙', bio: 'Stargazer and moon lover.' },
  { id: 'bot4', name: 'Liam', age: 29, emoji: '🏄', bio: 'Catch waves, not feelings.' }
];

// --- AUTH & INITIALIZATION ---
auth.onAuthStateChanged(async (user) => {
    const loader = document.getElementById('loading-overlay');
    if (user) {
        const doc = await db.collection('users').doc(user.uid).get();
        userData = doc.data();
        loader.classList.add('hidden');
        switchNav('dashboard');
        updateProfileUI();
    } else {
        loader.classList.add('hidden');
        showPage('landing');
    }
});

async function handleRegister() {
    const name = document.getElementById('reg-name').value;
    const age = document.getElementById('reg-age').value;
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;
    const bio = document.getElementById('reg-bio').value;

    if (!name || pass.length < 6) return alert("Fill all fields correctly.");

    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        const data = { name, age, bio, email, likes: [], matches: [], emoji: '😊', uid: cred.user.uid };
        await db.collection('users').doc(cred.user.uid).set(data);
    } catch (e) { alert(e.message); }
}

async function handleLogin() {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    try { await auth.signInWithEmailAndPassword(email, pass); } catch (e) { alert(e.message); }
}

// --- NAVIGATION ---
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    
    const nav = document.getElementById('bottom-nav');
    if (['dashboard', 'matches', 'profile'].includes(id)) {
        nav.classList.add('visible');
        document.querySelectorAll('.nav-item').forEach((item, i) => {
            const pages = ['dashboard', 'matches', 'profile'];
            item.classList.toggle('active', pages[i] === id);
        });
    } else { nav.classList.remove('visible'); }
}

function switchNav(id) {
    showPage(id);
    if(id === 'dashboard') renderCards();
    if(id === 'matches') renderMatches();
}

// --- SWIPE LOGIC ---
function renderCards() {
    const stack = document.getElementById('swipe-stack');
    stack.innerHTML = '';
    const slice = DUMMY_USERS.slice(currentIdx, currentIdx + 1);
    
    if(slice.length === 0) {
        stack.innerHTML = '<div style="text-align:center; padding-top:100px;"><h2>No more people!</h2><button class="btn btn-ghost" onclick="currentIdx=0;renderCards()">Refresh</button></div>';
        return;
    }

    slice.forEach(user => {
        const card = document.createElement('div');
        card.className = 'swipe-card';
        card.innerHTML = `
            <div class="swipe-card-img">${user.emoji}</div>
            <div class="swipe-card-info">
                <h2 style="font-family:Syne;">${user.name}, ${user.age}</h2>
                <p style="color:var(--text2); font-size:14px;">${user.bio}</p>
            </div>
        `;
        stack.appendChild(card);
    });
}

async function swipe(dir) {
    const cards = document.querySelectorAll('.swipe-card');
    if(cards.length === 0) return;
    const topCard = cards[cards.length - 1];
    
    topCard.style.transform = `translateX(${dir === 'left' ? -500 : 500}px) rotate(${dir === 'left' ? -30 : 30}deg)`;
    topCard.style.opacity = '0';

    const likedUser = DUMMY_USERS[currentIdx];
    swipeHistory.push({idx: currentIdx, user: likedUser});

    if(dir === 'right') {
        // Save like to DB
        await db.collection('users').doc(auth.currentUser.uid).update({
            likes: firebase.firestore.FieldValue.arrayUnion(likedUser.id)
        });
        
        // Match Logic: 50% chance for dummy users
        if(Math.random() > 0.5) {
            await db.collection('users').doc(auth.currentUser.uid).update({
                matches: firebase.firestore.FieldValue.arrayUnion(likedUser)
            });
            showMatch(likedUser);
        }
    }

    currentIdx++;
    setTimeout(renderCards, 400);
}

function rewind() {
    if(swipeHistory.length === 0) return;
    const last = swipeHistory.pop();
    currentIdx = last.idx;
    renderCards();
}

function showMatch(user) {
    document.getElementById('match-name-popup').innerText = user.name;
    document.getElementById('match-emoji-popup').innerText = user.emoji;
    document.getElementById('match-popup').style.display = 'flex';
}

function closeMatchPopup() { document.getElementById('match-popup').style.display = 'none'; }

// --- CHAT LOGIC ---
async function renderMatches() {
    const list = document.getElementById('matches-list');
    list.innerHTML = '<p style="text-align:center;">Loading matches...</p>';
    const doc = await db.collection('users').doc(auth.currentUser.uid).get();
    const matches = doc.data().matches || [];
    list.innerHTML = '';
    
    if(matches.length === 0) {
        list.innerHTML = '<p style="text-align:center; color:var(--text2);">No matches yet. Keep swiping!</p>';
        return;
    }

    matches.forEach(m => {
        const div = document.createElement('div');
        div.style = "background:var(--glass2); padding:15px; border-radius:15px; display:flex; align-items:center; gap:15px; cursor:pointer;";
        div.onclick = () => openChat(m);
        div.innerHTML = `<div style="font-size:30px;">${m.emoji}</div><div><b>${m.name}</b><div style="font-size:12px; color:var(--text2);">Online</div></div>`;
        list.appendChild(div);
    });
}

function openChat(user) {
    const myId = auth.currentUser.uid;
    activeChatId = myId < user.id ? `${myId}_${user.id}` : `${user.id}_${myId}`;
    document.getElementById('chat-header-name').innerText = user.name;
    showPage('chat');
    listenForMessages();
}

function listenForMessages() {
    if(unsubscribeChat) unsubscribeChat();
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';

    unsubscribeChat = db.collection('chats').doc(activeChatId).collection('messages')
        .orderBy('timestamp', 'asc')
        .onSnapshot(snap => {
            snap.docChanges().forEach(change => {
                if(change.type === 'added') {
                    const d = change.doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${d.sender === auth.currentUser.uid ? 'sent' : 'received'}`;
                    div.innerText = d.text;
                    container.appendChild(div);
                    container.scrollTop = container.scrollHeight;
                }
            });
        });
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';

    await db.collection('chats').doc(activeChatId).collection('messages').add({
        text, sender: auth.currentUser.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
}

// --- PROFILE ---
function updateProfileUI() {
    document.getElementById('profile-name-display').innerText = `${userData.name}, ${userData.age}`;
    document.getElementById('profile-bio-display').innerText = userData.bio;
}

@keyframes spin { to { transform: rotate(360deg); } }
</script>
</body>
</html>
